# 玲瓏 base/runtime 全局白名單配置
# ============================================
# 🌐 此文件是全局聲明，位於 skills/config/ 目錄下
#   - 所有 skill 和生成的工程共享此白名單
#   - 這是白名單的權威來源（Single Source of Truth）
#   - skill 級別的 config/base_runtime_whitelist.conf 是此文件的本地副本
#
# 格式說明：
#   - 每行一個條目，格式為：<base_id>/<base_version> <runtime_id>/<runtime_version> <描述>
#   - 以 # 開頭的行為注釋
#   - 空行忽略
#   - runtime_id 可為 "-" 表示無需 runtime（純 base 應用）
#
# ⚠️ 重要：白名單驗證是強制性的！
#   - 組合不在白名單中時，將阻止任務執行（包括 skills 初始化生成和實際打包）
#   - 如需使用新組合，請先在此文件中添加
#
# 此白名單用於：
#   1. pak_linyaps.sh 運行時驗證 base/runtime 是否為已知的合規組合（阻止不合規組合）
#   2. SKILL 生成階段驗證 base/runtime 組合（阻止不合規組合）
#   3. validate_base_runtime.sh / validate_pak_script.sh 離線驗證
#   4. LLM 生成時參考可用的 base/runtime 組合
#
# 查找優先級（本地優先全局）：
#   1. CLI 參數 --whitelist 指定的路徑
#   2. 環境變量 LINGLONG_WHITELIST_FILE 指定的路徑
#   3. 工程目錄下的 config/base_runtime_whitelist.conf
#   4. 腳本所在目錄的 config/base_runtime_whitelist.conf（skill 級別）
#   5. skills 全局目錄的 config/base_runtime_whitelist.conf（此文件）⭐
#
# 維護說明：
#   - 新增玲瓏官方發布的 base/runtime 時，請同步更新此文件
#   - 版本號應與玲瓏倉庫實際可用版本一致
#   - 廢棄的組合可保留但標記為 [deprecated]
#   - 修改此文件後，skill 級別的副本會在下次生成工程時自動同步

