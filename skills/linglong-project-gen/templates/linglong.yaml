version: "${ll_version}"

package:
  id: com.visualstudio.code
  name: "Visual Studio Code"
  version: ${ll_version}
  kind: app
  architecture: ${linyaps_arch}
  description: |
    Code Editing. Redefined.

base: ""
runtime: ""

buildext:
  apt:
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - git
      - clang-format
      - libsecret-1-0
      - shfmt
      - golang-go
      - gopls
      - zsh

command: ""

build: |
  ##Extract res
  # files/ 映射到 /usr/ 目录
  # binary/ 的内容直接对应 $prefix/ (files/)
  # pak_linyaps.sh 已处理路径转换和软链
  cp -rf /project/binary/* ${prefix}/

  # 复制桌面文件、图标等资源
  cp -rf /project/files_res/* ${prefix}/

  # Add an identity for LLM
  touch ${prefix}/.linyaps_genius
