version: "${ll_version}"

package:
  id: com.visualstudio.code
  name: "Visual Studio Code"
  version: ${ll_version}
  kind: app
  architecture: ${linyaps_arch}
  description: |
    Code Editing. Redefined.

base: ${base_id}/${base_version}
runtime: ${runtime_id}/${runtime_version}

buildext:
  apt:
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - git
      - clang-format
      - libsecret-1-0
      - shfmt
      - golang-go
      - gopls
      - zsh

command:
  - "${command}"

build: |
  ##Extract res
  # files/ 映射到 /usr/ 目录
  # files/bin/ -> /usr/bin/
  # files/share/ -> /usr/share/
  # files/lib/ -> /usr/lib/
  # 非 /usr 标准路径（如 /opt/uTools/）直接放到 files/ 下作为未归类目录
  mkdir -p ${prefix}/bin/ ${prefix}/share/ ${prefix}/lib/
  
  # 复制应用文件到 ${prefix}/ (files/) 根目录
  # pak_linyaps.sh 已处理路径转换：/opt/uTools/ -> files/uTools/
  cp -rf /project/binary/* ${prefix}/
  
  # 复制桌面文件、图标等资源
  cp -rf /project/files_res/* ${prefix}/